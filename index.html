<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soapy Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* ============================================================
   CSS VARIABLES
============================================================ */
:root {
  --red:        #ff1a1a;
  --red-dim:    #cc0000;
  --red-glow:   #ff1a1a66;
  --red-faint:  #ff1a1a22;
  --dark:       #0a0505;
  --dark2:      #110808;
  --dark3:      #1a0a0a;
  --dark4:      #221010;
  --panel:      #130808ee;
  --border:     #ff1a1a55;
  --text:       #ffcccc;
  --text-dim:   #aa6666;
  --font-head:  'Rajdhani', sans-serif;
  --font-mono:  'Share Tech Mono', monospace;
}

/* ============================================================
   RESET + BASE
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--dark);
  color: var(--text);
  font-family: var(--font-mono);
  overflow: hidden;
}

/* Scanline overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.08) 2px,
    rgba(0,0,0,.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* Background glow */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #3a000088 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 0% 100%, #2a000055 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 100% 50%, #1a000044 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ============================================================
   CLIP PATH — bottom-left slash corner
   clip-path: polygon(0 0, 100% 0, 100% 100%, 16px 100%, 0 calc(100% - 16px))
============================================================ */
.slash {
  clip-path: polygon(0 0, 100% 0, 100% 100%, 16px 100%, 0 calc(100% - 16px));
}
.slash-sm {
  clip-path: polygon(0 0, 100% 0, 100% 100%, 10px 100%, 0 calc(100% - 10px));
}
.slash-lg {
  clip-path: polygon(0 0, 100% 0, 100% 100%, 24px 100%, 0 calc(100% - 24px));
}

/* ============================================================
   MAIN LAYOUT
============================================================ */
#app {
  position: relative;
  z-index: 1;
  width: 740px;
  height: 92vh;
  margin: 20px auto;
  background: var(--panel);
  border: 1px solid var(--border);
  box-shadow: 0 0 60px var(--red-glow), inset 0 0 30px rgba(255,0,0,.04);
  display: flex;
  flex-direction: column;
  gap: 0;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 24px 100%, 0 calc(100% - 24px));
}

/* ============================================================
   TOPBAR
============================================================ */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  background: linear-gradient(90deg, #1f0505, #2a0808);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--red);
  text-shadow: 0 0 12px var(--red);
}

#topbar .logo { display: flex; align-items: center; gap: 10px; }
#topbar .logo::before {
  content: '⬡';
  font-size: 22px;
  color: var(--red);
  animation: pulse 2s infinite;
}

#conn-status {
  font-size: 12px;
  font-family: var(--font-mono);
  letter-spacing: 1px;
  color: var(--text-dim);
}
#conn-status.online  { color: #00ff88; text-shadow: 0 0 8px #00ff88; }
#conn-status.offline { color: var(--red); text-shadow: 0 0 8px var(--red); }

/* ============================================================
   TOOLBAR
============================================================ */
#toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--dark3);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

#toolbar input[type="text"] {
  background: #1a0808;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}
#toolbar input[type="text"]:focus {
  border-color: var(--red);
  box-shadow: 0 0 10px var(--red-glow);
}
#toolbar input[type="text"]::placeholder { color: var(--text-dim); }

#name { width: 130px; }
#text { flex: 1; min-width: 120px; }

/* Character counter */
#char-counter {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  min-width: 50px;
  text-align: right;
}
#char-counter.warn  { color: #ffaa00; }
#char-counter.over  { color: var(--red); text-shadow: 0 0 6px var(--red); }

/* ============================================================
   BUTTONS
============================================================ */
button {
  background: linear-gradient(135deg, #2a0808, #1a0505);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 16px;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background .15s, box-shadow .15s, color .15s;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  outline: none;
}
button:hover {
  background: linear-gradient(135deg, var(--red-dim), #880000);
  box-shadow: 0 0 14px var(--red-glow);
  color: #fff;
}
button:active { transform: scale(.97); }

button.icon {
  width: 36px; height: 36px;
  padding: 0;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}

#send-btn {
  background: linear-gradient(135deg, var(--red-dim), #660000);
  color: #fff;
  border-color: var(--red);
}
#send-btn:hover {
  background: linear-gradient(135deg, var(--red), #aa0000);
  box-shadow: 0 0 20px var(--red-glow);
}

/* ============================================================
   CHAT AREA
============================================================ */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--red-dim) var(--dark2);
}
#chat::-webkit-scrollbar       { width: 5px; }
#chat::-webkit-scrollbar-track { background: var(--dark2); }
#chat::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 2px; }

.msg {
  padding: 8px 12px;
  background: rgba(255,20,20,.04);
  border-left: 2px solid var(--border);
  clip-path: polygon(0 0, 100% 0, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  animation: fadeIn .2s ease;
  word-break: break-word;
}
.msg:hover { background: rgba(255,20,20,.08); }

.name {
  color: var(--red);
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  text-shadow: 0 0 8px var(--red-glow);
}

.msg-text { font-size: 13px; color: var(--text); }

.msg.error-msg {
  border-left-color: #ff6600;
  background: rgba(255,100,0,.08);
}
.msg.error-msg .msg-text { color: #ff9944; }

.msg img {
  max-width: 260px;
  border: 1px solid var(--border);
  margin-top: 6px;
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 10px 100%, 0 calc(100% - 10px));
}

.audio-btn {
  margin-top: 6px;
  font-size: 12px;
  padding: 5px 12px;
}

/* ============================================================
   SOAPYSOUNDS WINDOW
============================================================ */
#soundWindow {
  position: fixed;
  top: 100px; left: 100px;
  width: 320px;
  background: #0f0505ee;
  border: 1px solid var(--border);
  box-shadow: 0 0 30px var(--red-glow);
  display: none;
  flex-direction: column;
  z-index: 100;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 18px 100%, 0 calc(100% - 18px));
}

#soundTitle {
  background: linear-gradient(90deg, #1f0505, #2a0808);
  padding: 8px 14px;
  cursor: move;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 2px;
  color: var(--red);
  text-shadow: 0 0 8px var(--red);
  border-bottom: 1px solid var(--border);
  user-select: none;
}

.close-btn {
  cursor: pointer;
  font-size: 16px;
  color: var(--text-dim);
  transition: color .15s;
  background: none;
  border: none;
  padding: 0 4px;
  clip-path: none;
}
.close-btn:hover { color: var(--red); box-shadow: none; background: none; }

#soundContent {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#soundContent input[type="file"] {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
}

#audioPlayer {
  width: 100%;
  filter: hue-rotate(330deg) saturate(2);
}

/* ============================================================
   PHID POPUP OVERLAY
============================================================ */
#phid-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
  backdrop-filter: blur(4px);
}

#phid-box {
  background: #110606;
  border: 1px solid var(--red);
  box-shadow: 0 0 60px var(--red-glow), 0 0 120px #ff000022;
  width: 380px;
  padding: 28px 28px 24px;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 22px 100%, 0 calc(100% - 22px));
  display: flex;
  flex-direction: column;
  gap: 16px;
  animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
}

#phid-box h2 {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--red);
  text-shadow: 0 0 14px var(--red);
  text-transform: uppercase;
}

#phid-box p {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.6;
}

#phid-box a {
  color: var(--red);
  text-decoration: none;
  font-weight: bold;
  text-shadow: 0 0 6px var(--red-glow);
}
#phid-box a:hover { text-decoration: underline; }

#phid-input {
  background: #1a0808;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  width: 100%;
  transition: border-color .2s, box-shadow .2s;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}
#phid-input:focus {
  border-color: var(--red);
  box-shadow: 0 0 10px var(--red-glow);
}
#phid-input::placeholder { color: var(--text-dim); }

#phid-error {
  color: #ff6644;
  font-size: 12px;
  min-height: 16px;
}

.phid-btn-row {
  display: flex;
  gap: 10px;
}
.phid-btn-row button { flex: 1; }

#confirm-box {
  display: none;
  flex-direction: column;
  gap: 14px;
}

#confirm-name {
  font-family: var(--font-head);
  font-size: 18px;
  color: #fff;
  letter-spacing: 1px;
}
#confirm-name span { color: var(--red); text-shadow: 0 0 8px var(--red); }

/* ============================================================
   ANIMATIONS
============================================================ */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .4; }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes popIn {
  from { opacity: 0; transform: scale(.88); }
  to   { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<!-- ============================================================
     PHID LOGIN OVERLAY
============================================================ -->
<div id="phid-overlay">
  <div id="phid-box">

    <!-- Step 1: enter PHID -->
    <div id="step-enter">
      <h2>PHID Sign In</h2>
      <p>
        Enter your <strong>PHID</strong> to join the chat.<br>
        Don't have one? <a href="https://phid-accpanel.onrender.com" target="_blank">Sign up here →</a>
      </p>
      <input id="phid-input" type="text" placeholder="PHID-xxxx-xxxx-xxxx-xxxx" spellcheck="false">
      <div id="phid-error"></div>
      <div class="phid-btn-row">
        <button onclick="lookupPhid()">Confirm</button>
      </div>
    </div>

    <!-- Step 2: confirm identity -->
    <div id="step-confirm" style="display:none; flex-direction:column; gap:14px;">
      <h2>⬡ Is this you?</h2>
      <div id="confirm-name">Username: <span id="confirm-username"></span></div>
      <p style="font-size:12px; color:var(--text-dim);">
        Your identity will be saved so you won't need to sign in again on this device.
      </p>
      <div class="phid-btn-row">
        <button id="yes-btn" onclick="confirmIdentity()">Yes, that's me</button>
        <button onclick="resetPhidStep()">Not me</button>
      </div>
    </div>

  </div>
</div>

<!-- ============================================================
     MAIN APP
============================================================ -->
<div id="app">

  <div id="topbar">
    <div class="logo">Soapy Chat</div>
    <div id="conn-status">CONNECTING...</div>
  </div>

  <div id="toolbar">
    <button class="icon" title="SoapySounds" onclick="openSoundWindow()">🔊</button>
    <button class="icon" title="Send Image"  onclick="pickImage()">🖼️</button>
    <input  id="name" type="text" placeholder="Username" disabled>
    <input  id="text" type="text" placeholder="Message..." maxlength="300"
            onkeydown="if(event.key==='Enter') send()"
            oninput="updateCounter()">
    <span id="char-counter">0/300</span>
    <button id="send-btn" onclick="send()">Send</button>
    <input  id="img" type="file" accept="image/*" hidden>
  </div>

  <div id="chat"></div>
</div>

<!-- ============================================================
     SOAPYSOUNDS WINDOW
============================================================ -->
<div id="soundWindow">
  <div id="soundTitle">
    <span>⬡ SoapySounds</span>
    <button class="close-btn" onclick="closeSoundWindow()">✖</button>
  </div>
  <div id="soundContent">
    <input type="file" id="audioFile" accept="audio/*">
    <audio id="audioPlayer" controls></audio>
    <button onclick="sendAudio()">▶ Send Audio</button>
  </div>
</div>

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script>
/* ===== CONSTANTS ===== */
const MAX_CHARS    = 300;
const PHID_API     = "/phid/";  // proxied through our own server to avoid CORS
const STORAGE_KEY  = "soapychat_phid_identity";

/* ===== ELEMENTS ===== */
const chat         = document.getElementById("chat");
const connStatus   = document.getElementById("conn-status");
const nameInput    = document.getElementById("name");
const textInput    = document.getElementById("text");
const imgInput     = document.getElementById("img");
const charCounter  = document.getElementById("char-counter");
const soundWindow  = document.getElementById("soundWindow");
const soundTitle   = document.getElementById("soundTitle");
const audioFile    = document.getElementById("audioFile");
const audioPlayer  = document.getElementById("audioPlayer");
const phidOverlay  = document.getElementById("phid-overlay");
const phidInput    = document.getElementById("phid-input");
const phidError    = document.getElementById("phid-error");

/* ===== STATE ===== */
let ws           = null;
let joined       = false;
let currentAudio = null;
let pendingPhid  = null;
let pendingUser  = null;

/* ===== PHID IDENTITY FLOW ===== */

// On load: check if identity already saved
window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    const { username, phid } = JSON.parse(saved);
    applyIdentity(username, phid);
    phidOverlay.style.display = "none";
  }
  // else overlay stays visible
});

async function lookupPhid() {
  const val = phidInput.value.trim();
  if (!val) { phidError.textContent = "Please enter a PHID."; return; }
  phidError.textContent = "Looking up...";

  try {
    const res  = await fetch(PHID_API + encodeURIComponent(val));
    const data = await res.json();

    if (data.status === "not_found") {
      phidError.textContent = "PHID not found. Check your entry.";
      return;
    }

    // Show confirmation step
    pendingPhid = val;
    pendingUser = data.username;
    document.getElementById("confirm-username").textContent = data.username;
    document.getElementById("step-enter").style.display   = "none";
    document.getElementById("step-confirm").style.display = "flex";
    phidError.textContent = "";

  } catch (e) {
    phidError.textContent = "Could not reach PHID server. Try again.";
  }
}

function confirmIdentity() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    username: pendingUser,
    phid:     pendingPhid
  }));
  applyIdentity(pendingUser, pendingPhid);
  phidOverlay.style.display = "none";
}

function resetPhidStep() {
  pendingPhid = null;
  pendingUser = null;
  document.getElementById("step-enter").style.display   = "flex";
  document.getElementById("step-confirm").style.display = "none";
  phidInput.value = "";
  phidError.textContent = "";
}

function applyIdentity(username, phid) {
  nameInput.value    = username;
  nameInput.disabled = true;
}

/* ===== WEBSOCKET ===== */
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    connStatus.textContent = "● ONLINE";
    connStatus.className   = "online";
    // Auto-join with saved name
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const { username } = JSON.parse(saved);
      ws.send(JSON.stringify({ type: "join", name: username }));
      joined = true;
    }
  };

  ws.onclose = () => {
    connStatus.textContent = "● OFFLINE — RELOAD";
    connStatus.className   = "offline";
    // Reconnect after 3s
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === "history") {
      chat.innerHTML = "";
      msg.messages.forEach(addMessage);
    } else if (msg.type === "error") {
      addErrorMessage(msg.content);
    } else {
      addMessage(msg);
    }
  };
}
connect();

/* ===== CHAT RENDER ===== */
function addMessage(msg) {
  const d = document.createElement("div");
  d.className = "msg";

  if (msg.type === "image") {
    d.innerHTML = `<span class="name">${esc(msg.name)}</span><br>
                   <img src="${msg.content}" alt="image">`;
  } else if (msg.type === "audio") {
    d.innerHTML = `<span class="name">${esc(msg.name)}</span>
                   <span class="msg-text"> sent audio</span><br>
                   <button class="audio-btn" onclick='openAudio("${msg.content}")'>🔊 Open in SoapySounds</button>`;
  } else {
    d.innerHTML = `<span class="name">${esc(msg.name)}:</span>
                   <span class="msg-text"> ${esc(msg.content)}</span>`;
  }

  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function addErrorMessage(text) {
  const d = document.createElement("div");
  d.className = "msg error-msg";
  d.innerHTML = `<span class="msg-text">⚠ ${esc(text)}</span>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  setTimeout(() => d.remove(), 4000);
}

function esc(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

/* ===== CHAR COUNTER ===== */
function updateCounter() {
  const len = textInput.value.length;
  charCounter.textContent = `${len}/${MAX_CHARS}`;
  charCounter.className = len >= MAX_CHARS ? "over" : len >= 250 ? "warn" : "";
}

/* ===== SEND TEXT ===== */
function send() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const text = textInput.value.trim();
  if (!text) return;

  if (text.length > MAX_CHARS) {
    addErrorMessage(`Message too long! Max ${MAX_CHARS} characters.`);
    return;
  }

  if (!joined) {
    const name = nameInput.value.trim() || "Anonymous";
    ws.send(JSON.stringify({ type: "join", name }));
    joined = true;
  }

  ws.send(JSON.stringify({ type: "message", content: text }));
  textInput.value = "";
  updateCounter();
}

/* ===== IMAGE ===== */
function pickImage() { imgInput.click(); }

imgInput.onchange = () => {
  if (!imgInput.files[0]) return;
  const r = new FileReader();
  r.onload = () => {
    if (!joined) {
      ws.send(JSON.stringify({ type: "join", name: nameInput.value || "Anonymous" }));
      joined = true;
    }
    ws.send(JSON.stringify({ type: "image", content: r.result }));
  };
  r.readAsDataURL(imgInput.files[0]);
};

/* ===== SOAPYSOUNDS ===== */
function openSoundWindow()  { soundWindow.style.display = "flex"; }
function closeSoundWindow() { soundWindow.style.display = "none"; }

audioFile.onchange = () => {
  const r = new FileReader();
  r.onload = () => {
    currentAudio    = r.result;
    audioPlayer.src = currentAudio;
  };
  r.readAsDataURL(audioFile.files[0]);
};

function sendAudio() {
  if (!currentAudio) return;
  if (!joined) {
    ws.send(JSON.stringify({ type: "join", name: nameInput.value || "Anonymous" }));
    joined = true;
  }
  ws.send(JSON.stringify({ type: "audio", content: currentAudio }));
  closeSoundWindow();
}

function openAudio(data) {
  openSoundWindow();
  audioPlayer.src = data;
  audioPlayer.play();
}

/* ===== DRAG SOUND WINDOW ===== */
let drag = false, dx = 0, dy = 0;

soundTitle.onmousedown = e => {
  drag = true;
  dx = e.offsetX;
  dy = e.offsetY;
};
document.onmousemove = e => {
  if (!drag) return;
  soundWindow.style.left = (e.pageX - dx) + "px";
  soundWindow.style.top  = (e.pageY - dy) + "px";
};
document.onmouseup = () => drag = false;

/* ===== ENTER KEY on PHID input ===== */
phidInput.addEventListener("keydown", e => {
  if (e.key === "Enter") lookupPhid();
});
</script>
</body>
</html>
